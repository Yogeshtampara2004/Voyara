<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Voyara</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-card">
      <h1>Welcome back</h1>
      <p>Login to continue booking your next trip.</p>
      <form id="loginForm" class="auth-form">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" name="email" type="email" required />
        <label for="loginPassword">Password</label>
        <input id="loginPassword" name="password" type="password" minlength="6" required />
        <button type="submit">Login</button>
        <p id="loginMessage" class="auth-message"></p>
      </form>
      <p class="auth-link">No account? <a href="signup.html">Create one</a></p>
    </main>
    <script src="auth.js"></script>
    <script src="login.js"></script>
  </body>
</html>
