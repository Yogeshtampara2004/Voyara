<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voyara | Travel Booking</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="container">
        <h1>Voyara Travel Booking</h1>
        <p>Find and book memorable trips with smart search and filters.</p>
      </div>
    </header>

    <main class="container">
      <section class="controls" aria-label="Search and filters">
        <div class="control-group">
          <label for="searchInput">Search destination</label>
          <input id="searchInput" type="text" placeholder="e.g., Bali, Paris" />
        </div>

        <div class="control-group">
          <label for="typeFilter">Trip type</label>
          <select id="typeFilter">
            <option value="all">All</option>
            <option value="Beach">Beach</option>
            <option value="City">City</option>
            <option value="Adventure">Adventure</option>
            <option value="Nature">Nature</option>
          </select>
        </div>

        <div class="control-group">
          <label for="budgetFilter">Budget</label>
          <select id="budgetFilter">
            <option value="all">All</option>
            <option value="low">Under $1000</option>
            <option value="mid">$1000 - $2000</option>
            <option value="high">Above $2000</option>
          </select>
        </div>
      </section>

      <section>
        <h2>Available Packages</h2>
        <p id="resultsCount" class="results-count"></p>
        <div id="packageGrid" class="package-grid"></div>
      </section>
    </main>

    <template id="cardTemplate">
      <article class="card">
        <div class="card-content">
          <h3 class="card-title"></h3>
          <p class="card-meta"></p>
          <p class="card-price"></p>
          <button class="book-btn" type="button">Book Now</button>
        </div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
